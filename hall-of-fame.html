<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Chess Fan Club - Dashboard</title>
  <!-- Link to your separate dark mode stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-theme">
  <!-- Reusable navigation element loaded from site-nav.js -->
  <site-nav></site-nav>

  <header class="page-header">
    <div class="page-header-content">
      <p class="eyebrow">Club Hub</p>
      <h1>The Chess Fan Club</h1>
    </div>
  </header>

  <!-- Optimized Precise Dashboard Layout Container -->
  <main class="dashboard-grid">
    
    <!-- Left Section: Recent Joiners Roster -->
    <section class="dashboard-section joiners-section">
      <h2>👥 Newest Members</h2>
      <div id="joiners-list" class="joiners-list">
        <div class="loading-state">Loading roster...</div>
      </div>
    </section>

    <!-- Right Section: Hall of Fame Section (Reserved Placeholder) -->
    <section class="dashboard-section hall-of-fame-section">
      <h2>✨ Hall of Fame</h2>
      <div class="fame-container">
        <div class="fame-placeholder-card">
          <span class="fame-medal">👑</span>
          <div class="fame-meta">
            <h4>Club Champion</h4>
            <p>Coming Soon</p>
          </div>
        </div>
        <div class="fame-placeholder-card">
          <span class="fame-medal">🔥</span>
          <div class="fame-meta">
            <h4>Top Contributor</h4>
            <p>Coming Soon</p>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer>
    <p>© 2026 The Chess Fan Club</p>
    <p>Built by chess fans, for chess fans ♟️</p>
  </footer>

  <!-- Include your separate scripts at the bottom -->
  <script src="js/sync/SyncHallOfFame.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
